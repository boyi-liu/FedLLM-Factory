# Evaluation configuration: dataset -> task_type + metrics
# task_type: SEQ_CLS | CAUSAL_LM
# primary_metric: the metric used for model selection / reporting

datasets:
  sst2:
    task_type: SEQ_CLS
    metrics: [accuracy]
    primary_metric: accuracy

  imdb:
    task_type: SEQ_CLS
    metrics: [accuracy]
    primary_metric: accuracy

  gsm8k:
    task_type: CAUSAL_LM
    metrics: [exact_match, perplexity, mmlu]
    primary_metric: exact_match

  dolly:
    task_type: CAUSAL_LM
    metrics: [perplexity, rouge, mmlu]
    primary_metric: rougeL

  alpaca:
    task_type: CAUSAL_LM
    metrics: [perplexity, rouge, mmlu]
    primary_metric: rougeL

  sensorqa:
    task_type: CAUSAL_LM
    metrics: [perplexity]
    primary_metric: perplexity

  homebench:
    task_type: CAUSAL_LM
    metrics: [perplexity]
    primary_metric: perplexity


# Global eval settings
eval_samples: 100        # max samples for per-round evaluation (loss/perplexity only)
final_eval_samples: 200  # max samples for final evaluation (all metrics incl. generation)
final_eval_batch_size: 8 # batch size for model.generate() during final evaluation

# Global benchmarks — evaluated on the aggregated model at final evaluation only
global_benchmarks:
  mmlu:
    enabled: false        # set to true to enable
    n_shot: 5             # few-shot examples per subject
    max_per_subject: 100  # max test samples per subject (0 = full)
